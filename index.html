<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">

      <div class="div-sinistra"> <!--metto icona play inserito cosi per bootstrap-->
        <i class="bi bi-camera-video"></i>

      </div> <!--testo centrale esplora ecc e icone
      span per inserire piccoli pezzi di testo in linea -->
      <div class="div-centro">
        <span> Esplora</span>
        <span>Seguiti</span>
        <span>Per te</span>

      </div> <!--icona di ricerca-->
      <div class="div-destra">
        <i class="bi bi-search"></i>
      </div>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <!--foto profilo-->
      <div class="fotoprofilo">

      </div> <!--simbolo like-->
      <div class="like">

      </div> <!-- simbolo commenti-->
      <div class="commenti">

      </div>
      <div class="elementi-salvati">

      </div>
      <div class="condividi">

      </div>

      <!--info del video titolo e descrizione-->
      <div class="info-video">
        <span>boolean.careers</span>
        <p>Prova il Fundamentals Camp…</p>
      </div>

      <!-- Footer -->
      <footer class="footer-menu">
        <div class="home">
          <i class="bi bi-house-door"></i> <!--simbolo home-->
          <span>Home</span>
        </div>
        <div class="amici">
          <i class="bi bi-people"></i>
          <span>Amici</span>
        </div>
        <div class="+">
          <span>+</span>
        </div>
        <div class="posta-in-arrivo">
          <i class="bi bi-chat-dots"></i>
          <span>Posta in arrivo</span>
        </div>
        <div class="profilo-account">
          <i class="bi bi-person"></i>
          <span>Profilo</span>
        </div>
      </footer>
    </div>

</body>

</html>
